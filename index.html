<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23e6a030'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%231e2432' font-family='Arial' font-weight='bold' font-size='20'%3EN%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      (function(){
        try {
          var t = localStorage.getItem('theme');
          var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || ((!t || t === 'system') && d)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e){ document.documentElement.classList.add('dark'); }
      })();
    </script>
    <title>Noucolor — Gestió Interna</title>
    <meta name="description" content="Aplicación de gestión interna de Noucolor — Pintura i Decoració, Andorra" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
